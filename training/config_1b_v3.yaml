model:
  path: "/root/runs/ctc1b_v3/ws_1.017de44c/checkpoints/step_11000/model/pp_00/tp_00/sdp_00.pt"  # warm-start
  family: "wav2vec2_asr"                                        # from step_11000 -- this run crashed
  arch: "1b_v2"                                                 # here (see regime section below for why)
  # `name` is set purely to satisfy the recipe's own prepare_model() check
  # (it requires config.model.name to be non-empty to take the
  # "training_from_pretrained_model" branch) -- fairseq2's actual model
  # loader prioritizes `path` over `name` whenever both are set, so this
  # does NOT change which weights actually load; verified against
  # fairseq2/recipe/internal/model.py's bootstrap(): `if section.path is not
  # None: ... return self._load_custom_model()` runs before `name` is ever
  # consulted.
  name: "omniASR_CTC_1B_v2"
tokenizer:  { name: "omniASR_tokenizer_written_v2" }

dataset:
  name: "afrivoices_asr"
  train_split: "train"
  valid_split: "dev"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "/root/data/afrivoices_processed/language_distribution_0.tsv"
    beta_corpus: 0.5
    # LOWERED from 0.5 -> 0.2 (and corrected the direction in our own notes,
    # which had this backwards): weight = (hours/total_hours)^beta, so beta=1
    # means fully natural/proportional-to-hours sampling (favors Swahili,
    # 502,869 train rows vs Kalenjin's 86,227 and Maasai's 53,145), and
    # beta->0 means fully EQUAL per-language weighting regardless of hours.
    # Kalenjin/Maasai are consistently our worst-performing languages under
    # the leaderboard's flat unweighted-mean metric -- a lower beta pushes
    # more training exposure toward them specifically.
    beta_language: 0.2
    fragment_loading: { cache: True }
  asr_task_config:
    min_audio_len: 32_000      # 2s at 16kHz
    max_audio_len: 960_000     # 60s at 16kHz
    # batch size in audio samples. Tried raising this to 2_500_000 before this
    # run to use more of the ~26GB unused VRAM headroom (only ~20GB/46GB used
    # at this cap) -- compute time roughly doubled proportional to the batch
    # size increase over 100 test steps, so elements/sec was flat-to-slightly-
    # worse (1.386M vs 1.439M). Confirms this workload is genuinely
    # compute-bound, not memory-bound; reverted to the proven value.
    max_num_elements: 1_500_000
    normalize_audio: true
    example_shuffle_window: 10_000
    batch_shuffle_window: 1000

optimizer: { config: { lr: 1.0e-05 } }

trainer:
  freeze_encoder_for_n_steps: 0
  mixed_precision: { dtype: "torch.bfloat16" }
  grad_accumulation: { num_batches: 8 }
  activation_checkpointing: { mode: "layerwise" }
  max_grad_norm: 10.0

regime:
  # ONE long continuous anneal was the goal (see the original v3 run's
  # rationale: repeated short fresh-anneal cycles showed diminishing
  # returns, likely partly from each restart's warmup undoing the previous
  # cycle's low-LR convergence). That run crashed at step 11_000 -- a
  # zero-length audio row in the dev split broke the periodic validation
  # pass's WER calculation (an uncaught exception, not just a skipped
  # validation), killing the whole process. `save_model_only: true` never
  # saves optimizer/scheduler state, so there's no way to resume the exact
  # LR trajectory -- warm-starting again means a fresh tri-stage cycle
  # regardless. Given that's now unavoidable, num_steps continues the
  # original 35_000-step target (11_000 already done + 24_000 here).
  #
  # The actual fix: validation is disabled entirely (`validate_every_n_steps:
  # null`) so this exact crash can't recur -- we don't rely on the built-in
  # "best" checkpoint tracking anyway (that requires validation, hence also
  # disabling `keep_best_n_checkpoints` and using `keep_last_n_checkpoints`
  # instead), since checkpoint selection is done externally via evaluate.py
  # against the same dev set.
  num_steps: 24_000
  validate_every_n_steps: null
  checkpoint_every_n_steps: 1000
  save_model_only: true
  keep_last_n_checkpoints: 3
  score_metric: "wer"

common:
  metric_recorders:
    tensorboard: { enabled: true }
    wandb: { enabled: true, entity: null, project: "afrivoices-asr", run_name: "ctc1b-longrun-langreweight-resumed-from-11000" }
