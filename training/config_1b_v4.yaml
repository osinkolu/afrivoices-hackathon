model:
  path: "/root/runs/ctc1b_v3b/ws_1.b0005672/checkpoints/step_24000/model/pp_00/tp_00/sdp_00.pt"  # warm-start
  family: "wav2vec2_asr"                                        # from our best confirmed checkpoint
  arch: "1b_v2"                                                 # (v3b/step_24000, 0.4924 dev mean WER)
  # `name` is set purely to satisfy the recipe's own prepare_model() check
  # (it requires config.model.name to be non-empty to take the
  # "training_from_pretrained_model" branch) -- fairseq2's actual model
  # loader prioritizes `path` over `name` whenever both are set, so this
  # does NOT change which weights actually load; verified against
  # fairseq2/recipe/internal/model.py's bootstrap(): `if section.path is not
  # None: ... return self._load_custom_model()` runs before `name` is ever
  # consulted.
  name: "omniASR_CTC_1B_v2"
tokenizer:  { name: "omniASR_tokenizer_written_v2" }

dataset:
  name: "afrivoices_asr"
  train_split: "train"
  valid_split: "dev"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "/root/data/afrivoices_processed/language_distribution_0.tsv"
    beta_corpus: 0.5
    # LOWERED further from 0.2 -> 0.1: weight = (hours/total_hours)^beta.
    # At beta=0.2, Kalenjin/Maasai/Somali all improved alongside Swahili/
    # Kikuyu (nothing regressed), suggesting there's room to push the
    # low-resource languages even harder without risking the others. This
    # is a deliberately modest further step (not straight to 0/fully-equal)
    # given limited remaining time to course-correct if it overshoots.
    beta_language: 0.1
    fragment_loading: { cache: True }
  asr_task_config:
    min_audio_len: 32_000      # 2s at 16kHz
    max_audio_len: 960_000     # 60s at 16kHz
    max_num_elements: 1_500_000  # proven value -- see config_1b_v3.yaml for why a larger batch was tried and reverted
    normalize_audio: true
    example_shuffle_window: 10_000
    batch_shuffle_window: 1000

optimizer: { config: { lr: 1.0e-05 } }

trainer:
  freeze_encoder_for_n_steps: 0
  mixed_precision: { dtype: "torch.bfloat16" }
  grad_accumulation: { num_batches: 8 }
  activation_checkpointing: { mode: "layerwise" }
  max_grad_norm: 10.0

regime:
  # Deliberately modest budget given the deadline is close: a short fresh
  # anneal (same restart-penalty caveat as every warm-start here, since
  # save_model_only never preserves optimizer/scheduler state) to test
  # whether the further-lowered beta_language helps, without committing so
  # much time that there's no buffer left for evaluation + submission.
  num_steps: 3_000
  validate_every_n_steps: null  # disabled -- see config_1b_v3.yaml for why
  checkpoint_every_n_steps: 500
  save_model_only: true
  keep_last_n_checkpoints: 3
  score_metric: "wer"

common:
  metric_recorders:
    tensorboard: { enabled: true }
    wandb: { enabled: true, entity: null, project: "afrivoices-asr", run_name: "ctc1b-langreweight-0.1-3000steps" }
