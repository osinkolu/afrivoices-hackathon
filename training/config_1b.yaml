model:      { name: "omniASR_CTC_1B_v2" }
tokenizer:  { name: "omniASR_tokenizer_written_v2" }

dataset:
  name: "afrivoices_asr"
  train_split: "train"
  valid_split: "dev"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "/root/data/afrivoices_processed/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5        # sqrt temperature: upsample mas/kln relative to swa
    fragment_loading: { cache: True }
  asr_task_config:
    min_audio_len: 32_000      # 2s at 16kHz
    max_audio_len: 960_000     # 60s at 16kHz
    max_num_elements: 1_500_000  # batch size in audio samples; A40 has 46GB, plenty for 1B -- tune up after checking first-step memory usage
    normalize_audio: true
    example_shuffle_window: 10_000  # required as of this fairseq2 version (defaults to 0 = shuffle whole dataset = OOM risk); buffered shuffle instead
    batch_shuffle_window: 1000

optimizer: { config: { lr: 1.0e-05 } }

trainer:
  freeze_encoder_for_n_steps: 0
  mixed_precision: { dtype: "torch.bfloat16" }
  grad_accumulation: { num_batches: 8 }
  activation_checkpointing: { mode: "layerwise" }
  max_grad_norm: 10.0

regime:
  num_steps: 8_000            # realistic budget so warmup->hold->decay all happen; don't inflate this
  validate_every_n_steps: 500
  checkpoint_every_n_steps: 500
  save_model_only: true        # skip optimizer state in checkpoints: smaller, faster, avoids disk-quota crashes
  keep_best_n_checkpoints: 3
  score_metric: "wer"

common:
  metric_recorders:
    tensorboard: { enabled: true }
    wandb: { enabled: true, entity: null, project: "afrivoices-asr", run_name: "ctc1b" }
